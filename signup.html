<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScamShield - Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0b1220;
    font-family:Arial,Helvetica,sans-serif;
}

.card{
    background:#111827;
    border:none;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,.35);
}

.logo{
    font-size:45px;
}

.title{
    color:white;
    font-weight:bold;
}

.subtitle{
    color:#9ca3af;
}

.form-control{
    background:#1f2937;
    border:none;
    color:white;
    padding:14px;
}

.form-control:focus{
    background:#1f2937;
    color:white;
    box-shadow:none;
    border:1px solid #3b82f6;
}

.btn-primary{
    background:#2563eb;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
}

.btn-primary:hover{
    background:#1d4ed8;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

.password-box{
    position:relative;
}

.toggle{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
    color:#9ca3af;
}

.error{
    color:#ef4444;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
}

.match{
    font-size:13px;
    margin-top:8px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card p-5" style="width:430px;">

<div class="text-center">

<div class="logo">🛡️</div>

<h2 class="title mt-3">Create Account</h2>

<p class="subtitle">
Join ScamShield AI
</p>

</div>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST" id="signupForm">

<div class="mb-3">

<input
class="form-control"
name="username"
placeholder="Username"
required>

</div>

<div class="mb-3 password-box">

<input
class="form-control"
id="password"
type="password"
name="password"
placeholder="Password"
required>

<span class="toggle" onclick="togglePassword('password')">👁</span>

</div>

<div class="mb-3 password-box">

<input
class="form-control"
id="confirm"
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<span class="toggle" onclick="togglePassword('confirm')">👁</span>

<div id="match" class="match"></div>

</div>

<button
id="signupBtn"
class="btn btn-primary w-100">

Create Account

</button>

</form>

<div class="text-center mt-4 text-white">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

</div>

<script>

function togglePassword(id){

    const box=document.getElementById(id);

    if(box.type==="password"){
        box.type="text";
    }else{
        box.type="password";
    }

}

const password=document.getElementById("password");
const confirm=document.getElementById("confirm");
const match=document.getElementById("match");

confirm.addEventListener("input",()=>{

    if(confirm.value===""){
        match.innerHTML="";
        return;
    }

    if(password.value===confirm.value){

        match.innerHTML="✅ Passwords match";
        match.style.color="#22c55e";

    }else{

        match.innerHTML="❌ Passwords do not match";
        match.style.color="#ef4444";

    }

});

document.getElementById("signupForm").addEventListener("submit",(e)=>{

    if(password.value!==confirm.value){

        e.preventDefault();

        alert("Passwords do not match.");

        return;

    }

    const btn=document.getElementById("signupBtn");

    btn.innerHTML="Creating Account...";

    btn.disabled=true;

});

</script>

</body>
</html>
