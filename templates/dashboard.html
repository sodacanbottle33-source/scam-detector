<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScamShield AI Dashboard</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #313338;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: #2b2d31;
    padding: 40px;
    border-radius: 14px;
    width: 500px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,.5);
}

/* BUTTONS */
button {
    padding: 12px 18px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #5865f2;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #4752c4;
}

/* STATUS */
#status {
    margin-top: 15px;
    color: #b5bac1;
}

</style>

</head>

<body>

<div class="card">

    <h1>🛡 ScamShield AI</h1>

    <p>Voice Scam Detector</p>

    <!-- MIC BUTTONS -->
    <button onclick="startRecording()">🎤 Start Recording</button>
    <button onclick="stopRecording()">⏹ Stop Recording</button>

    <p id="status">Ready</p>

    <!-- FORM TO SEND AUDIO TO FLASK -->
    <form id="audioForm" method="POST" enctype="multipart/form-data">

        <input type="file" name="audio" id="audioInput" hidden>

        <button type="submit">📤 Analyze Voice</button>

    </form>

</div>

<script>

let mediaRecorder;
let audioChunks = [];

/* START RECORDING */
function startRecording(){

    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.start();

        document.getElementById("status").innerText = "🎤 Recording...";

        mediaRecorder.ondataavailable = e => {
            audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {

            const audioBlob = new Blob(audioChunks, { type: "audio/wav" });

            const file = new File([audioBlob], "voice.wav");

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);

            document.getElementById("audioInput").files = dataTransfer.files;

            document.getElementById("status").innerText = "✅ Recording ready";

            audioChunks = [];
        };

    });

}

/* STOP RECORDING */
function stopRecording(){

    if(mediaRecorder){
        mediaRecorder.stop();
        document.getElementById("status").innerText = "⏹ Stopped";
    }

}

</script>

</body>
</html>
