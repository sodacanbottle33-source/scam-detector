<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScamShield AI Dashboard</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #313338;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #2b2d31;
    padding: 40px;
    border-radius: 14px;
    width: 520px;
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #1e1f22;
    color: white;
}

button {
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #5865f2;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
}

button:hover {
    background: #4752c4;
}

#status {
    margin-top: 10px;
    color: #b5bac1;
}

.section {
    margin-bottom: 20px;
}

</style>

</head>

<body>

<div class="card">

    <h1>🛡 ScamShield AI</h1>
    <p>Text + Voice Scam Detector</p>

    <!-- TEXT INPUT -->
    <form method="POST">

        <div class="section">

            <h3>✍️ Text Scan</h3>

            <textarea name="message" placeholder="Paste or type message..."></textarea>

            <button type="submit">Analyze Text</button>

        </div>

    </form>

    <hr style="margin:20px 0; opacity:0.2;">

    <!-- VOICE INPUT -->
    <div class="section">

        <h3>🎤 Voice Scan</h3>

        <button onclick="startRecording()">Start Mic</button>
        <button onclick="stopRecording()">Stop</button>

        <p id="status">Ready</p>

        <form method="POST" enctype="multipart/form-data" id="audioForm">

            <input type="file" name="audio" id="audioInput" hidden>

            <button type="submit">Analyze Voice</button>

        </form>

    </div>

</div>

<script>

let mediaRecorder;
let audioChunks = [];

/* START MIC */
function startRecording(){

    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.start();

        document.getElementById("status").innerText = "🎤 Recording...";

        mediaRecorder.ondataavailable = e => {
            audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {

            const blob = new Blob(audioChunks, { type: "audio/wav" });

            const file = new File([blob], "voice.wav");

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);

            document.getElementById("audioInput").files = dataTransfer.files;

            document.getElementById("status").innerText = "✅ Ready";

            audioChunks = [];
        };

    });

}

/* STOP MIC */
function stopRecording(){
    mediaRecorder.stop();
    document.getElementById("status").innerText = "⏹ Stopped";
}

</script>

</body>
</html>
