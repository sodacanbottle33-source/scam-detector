<div class="card">

    <h1>🛡 ScamShield AI</h1>
    <p>Text + Voice Scam Detector</p>

    <!-- TEXT SCAN -->
    <form method="POST">

        <div class="section">

            <h3>✍️ Text Scan</h3>

            <textarea name="message" placeholder="Type or paste message..." required></textarea>

            <button type="submit">Analyze Text</button>

        </div>

    </form>

    <hr>

    <!-- VOICE SCAN -->
    <div class="section">

        <h3>🎤 Voice Scan</h3>

        <button onclick="startRecording()">Start Recording</button>
        <button onclick="stopRecording()">Stop Recording</button>

        <p id="status">Ready</p>

        <!-- ⚡ IMPORTANT FIX: action="/dashboard" -->
        <form method="POST" enctype="multipart/form-data" action="/dashboard">

            <input type="file" name="audio" id="audioInput" hidden>

            <button type="submit">Analyze Voice</button>

        </form>

    </div>

</div>

<script>

let mediaRecorder;
let audioChunks = [];

/* START MIC */
function startRecording(){

    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.start();

        document.getElementById("status").innerText = "🎤 Recording...";

        mediaRecorder.ondataavailable = e => {
            audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {

            const blob = new Blob(audioChunks, { type: "audio/wav" });

            const file = new File([blob], "voice.wav");

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);

            document.getElementById("audioInput").files = dataTransfer.files;

            document.getElementById("status").innerText = "✅ Ready to send";

            audioChunks = [];
        };

    });

}

/* STOP MIC */
function stopRecording(){

    if(mediaRecorder){
        mediaRecorder.stop();
        document.getElementById("status").innerText = "⏹ Stopped";
    }

}

</script>

</body>
</html>
