<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScamShield - Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.card{
    background:#111827;
    color:white;
    width:420px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    background:#1f2937;
    color:white;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

.center{
    text-align:center;
}
</style>

</head>

<body>

<div class="card">

<div class="center">

<h1>🛡 ScamShield AI</h1>

<h3>Create Your Account</h3>

<p>Join the next generation scam detector.</p>

</div>

<form method="POST">

<input
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>Create Account</button>

</form>

<br>

<div class="center">

Already have an account?

<br><br>

<a href="/login">Login</a>

</div>

</div>

</body>
</html>
