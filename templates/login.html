<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScamShield AI - Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #313338;
    font-family: Inter, Arial, Helvetica, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: #5865f2;
    filter: blur(180px);
    opacity: .18;
    top: -150px;
    left: -150px;
}
body::after {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: #00a8fc;
    filter: blur(180px);
    opacity: .12;
    bottom: -200px;
    right: -100px;
}
.card {
    width: 460px;
    background: #2b2d31;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 30px 60px rgba(0,0,0,.45);
    z-index: 2;
}
.logo {
    font-size: 64px;
    text-align: center;
    margin-bottom: 18px;
}
h1 {
    text-align: center;
    color: white;
    font-size: 30px;
    margin-bottom: 10px;
}
.subtitle {
    text-align: center;
    color: #b5bac1;
    font-size: 15px;
    margin-bottom: 30px;
}
.input-group {
    margin-bottom: 18px;
    position: relative;
}
input {
    width: 100%;
    padding: 14px;
    background: #1e1f22;
    border: 1px solid transparent;
    border-radius: 8px;
    color: white;
    font-size: 15px;
}
input:focus {
    outline: none;
    border-color: #5865f2;
}
.toggle {
    position: absolute;
    right: 14px;
    top: 44px;
    cursor: pointer;
    color: #b5bac1;
    user-select: none;
}
.toggle:hover {
    color: white;
}
.error {
    color: #ed4245;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
}
button {
    width: 100%;
    padding: 14px;
    background: #5865f2;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
button:hover {
    background: #4752c4;
}
.bottom {
    margin-top: 28px;
    text-align: center;
    color: #b5bac1;
}
.bottom a {
    color: #00a8fc;
    text-decoration: none;
}
</style>
</head>
<body>
<div class="card">
    <div class="logo">🛡️</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to ScamShield AI</p>
    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}
    <form method="POST" id="loginForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input
                id="password"
                type="password"
                name="password"
                placeholder="Password"
                required>
            <span class="toggle" onclick="toggle()">👁</span>
        </div>
        <button id="loginBtn" type="submit">
            Log In
        </button>
    </form>
    <div class="bottom">
        Need an account? <br><br>
        <a href="/signup">Create Account</a>
    </div>
</div>
<script>
function toggle(){
    const box = document.getElementById("password");
    box.type = box.type === "password" ? "text" : "password";
}
document.getElementById("loginForm").addEventListener("submit", () => {
    const btn = document.getElementById("loginBtn");
    btn.innerHTML = "Logging in...";
    btn.disabled = true;
});
</script>
</body>
</html>
