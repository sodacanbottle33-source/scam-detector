<!DOCTYPE html>

<html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>ScamShield AI - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#0b1220;
        font-family:Arial, Helvetica, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        width:420px;
        background:#111827;
        color:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 20px 40px rgba(0,0,0,.45);
    }

    .logo{
        text-align:center;
        font-size:55px;
        margin-bottom:10px;
    }

    h1{
        text-align:center;
        font-size:30px;
        margin-bottom:8px;
    }

    .subtitle{
        text-align:center;
        color:#9ca3af;
        margin-bottom:30px;
    }

    input{
        width:100%;
        padding:14px;
        margin-bottom:18px;
        background:#1f2937;
        border:none;
        border-radius:10px;
        color:white;
        font-size:16px;
    }

    input:focus{
        outline:none;
        border:2px solid #2563eb;
    }

    button{
        width:100%;
        padding:14px;
        border:none;
        border-radius:10px;
        background:#2563eb;
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        background:#1d4ed8;
        transform:translateY(-2px);
    }

    .bottom{
        text-align:center;
        margin-top:25px;
    }

    a{
        color:#60a5fa;
        text-decoration:none;
    }

    a:hover{
        text-decoration:underline;
    }
</style>

</head>

<body>

<div class="card">

<div class="logo">🛡️</div>

<h1>Welcome Back</h1>

<p class="subtitle">
    Sign in to ScamShield AI
</p>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

<div class="bottom">

    Don't have an account?

    <br><br>

    <a href="/signup">
        Create Account
    </a>

</div>

</div>

</body> </html>
